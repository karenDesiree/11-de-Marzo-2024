<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotihermes</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font for a modern UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="view-container active">
        <div class="login-box">
            <img src="logoPinguino.png" alt="Spotihermes Logo" class="app-logo">
            <h1>Spotihermes</h1>
            <p>Bienvenida mi amor. Ingresa la palabra secreta para entrar a nuestro rincón musical.</p>
            <input type="password" id="password-input" placeholder="Contraseña">
            <button class="btn primary-btn" onclick="checkPassword()">Entrar</button>
            <p id="login-error" class="hidden">Contraseña incorrecta.</p>
        </div>
    </div>

    <!-- LIBRARY VIEW -->
    <div id="library-view" class="view-container hidden">
        <div class="library-glass-panel">
            <div class="library-hero">
                <img src="logoPinguino.png" alt="Spotihermes" class="header-logo">
                <div class="hero-text">
                    <h2>Spotihermes</h2>
                    <p>Playlist especial para ti, hermosa. Elige la canción que te preparé.</p>
                </div>
            </div>

            <div class="library-list">
                <!-- Card 1 -->
                <div class="library-list-item" onclick="openPlayer(0)">
                    <img src="1.png" alt="Cover 1" class="list-item-cover">
                    <div class="list-item-info">
                        <h3>11 de marzo</h3>
                        <p>Hermes</p>
                    </div>
                    <div class="list-item-play">▶</div>
                </div>

                <!-- Card 2 -->
                <div class="library-list-item" onclick="openPlayer(1)">
                    <img src="2.jpg" alt="Cover 2" class="list-item-cover">
                    <div class="list-item-info">
                        <h3>Mi cama</h3>
                        <p>Hermes</p>
                    </div>
                    <div class="list-item-play">▶</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="player-view" class="view-container hidden">
        <button class="btn back-btn" onclick="closePlayer()">&#8592; Volver</button>
        
        <div class="music-player">
            <div class="disk"></div>
            <h1 class="music-name">Cargando...</h1>
            <p class="artist-name">Cargando...</p>

            <div class="song-sider">
                <input type="range" value="0" class="seek-bar">
                <span class="current-time">00:00</span>
                <span class="song-duration">00:00</span>
            </div>

            <div class="controls">
                <button class="btn control-btn backward-btn" onclick="prevMusic()">&#9664;&#9664;</button>

                <button class="play-btn">
                    <span></span>
                    <span></span>
                </button>
                <button class="btn control-btn forward-btn" onclick="nextMusic()">&#9654;&#9654;</button>
            </div>

            <button class="btn outline-btn" onclick="openLyrics()"><strong>Letra Completa</strong></button>
        </div>
    </div>

    <!-- LYRICS MODAL -->
    <div id="lyrics-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLyrics()">&times;</span>
            <h2 id="modal-title">Letra</h2>
            <div id="modal-lyrics-text" class="lyrics-text"></div>
        </div>
    </div>

    <!-- Add Audio Element -->
    <audio src="" id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
